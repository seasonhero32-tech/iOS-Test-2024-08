name: iOS IPA Free Compilation
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Build iOS App (Unsigned)
        run: |
          xcodebuild -project iOS-Test.xcodeproj -scheme iOS-Test -sdk iphoneos -configuration Release clean build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          
      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/iOS-Test.app Payload/
          zip -r RegeditDashboard.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegeditDashboard-IPA
          path: RegeditDashboard.ipa
